# C:/nginx/conf/nginx.conf
worker_processes 1;
events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Включаем сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

    server {
        listen 5000;
        server_name localhost;

        # React фронтенд - используем dev сервер
server {
    listen 5000;

    location / {
        return 200 "Nginx works!";
        add_header Content-Type text/plain;
    }
}

        # Кеширование статических файлов (если используешь собранную версию)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            proxy_pass http://localhost:5173;
        }

        # Кеширование HTML (недолго)
        location ~* \.html$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
            proxy_pass http://localhost:5173;
        }

        # FastAPI бэкенд (кеширование только для GET запросов)
        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Кеширование ответов API (только для GET)
            proxy_cache_valid 200 302 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # WebSocket (не кешируем)
        location /api/auth/ws {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            # Отключаем кеш для WebSocket
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
    }
}